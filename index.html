<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buddi Releases</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: Canvas;
        color: CanvasText;
      }

      main {
        width: min(640px, calc(100vw - 48px));
      }

      h1 {
        font-size: 32px;
        margin: 0 0 12px;
      }

      p {
        color: color-mix(in srgb, CanvasText 72%, Canvas);
        line-height: 1.5;
      }

      a {
        color: LinkText;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Buddi Releases</h1>
      <p>Public update feed and release artifacts for Buddi.</p>
      <p><a href="./appcast.xml">Sparkle appcast</a> · <a href="https://github.com/vietairs/buddi-releases/releases/latest">Latest download</a></p>
    </main>
  </body>
</html>
